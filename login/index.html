<html>
  <head>
    <title>Login to T.S.A.S.</title>
    <link rel="stylesheet" type="text/css" href="../style.css">
    <link rel="shortcut icon" type="image/png" href="../images/favicon.jpg">
  </head>
  <body>
    <div class="center">
      <font face = "Verdana" size = "4"><a href="../"><button class="button button">Back</button></a></font>
      <center>
        <font face="Verdana" size="6">Login/Signup to T.S.A.S. to access premium content!</font>
        <br>
        <br>
        <br>
        <iframe src="https://dominic.eu5.org/TSAS" title="Login" width="100%" height="500"></iframe>
        <br>
        <font face = "Verdana" size="6">Sign in with Google!</font>
        <script src="https://accounts.google.com/gsi/client" async></script>
        <div id="g_id_onload"
          data-client_id="669655380711-nooej7rroc09qspavcl2k5955jf2somk.apps.googleusercontent.com"
          data-login_uri="https://tsasofficial.github.io/members"
          data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="sign_in_with"
         data-shape="rectangular"
         data-callback="OnSuccess"
         data-logo_alignment="left">
      </div>
      </center>
    </div>
  </body>
</html>
