<!DOCTYPE html>
<html lang="en">
<head>
  <title>Logging you out...</title>
  <link rel="stylesheet" type="text/css" href="../../style.css">
  <link rel="shortcut icon" type="image/png" href="../../images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Angkor&family=Belanosima&display=swap" rel="stylesheet">
  <script src="../../script.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.18.0/js/msal-browser.min.js"></script>
  <script>
    // MSAL.js configuration
    const msalConfig = {
            auth: {
                clientId: "244e92a4-1f38-485b-9100-b9581efa4a75",  // Replace with your client ID
                authority: "https://login.microsoftonline.com/common", // Common endpoint for multi-tenant
                redirectUri: "https://tsasofficial.github.io/members/logout", // The URL that users are redirected to after logging in/out
            },
            cache: {
                cacheLocation: "localStorage", // This configures where your cache will be stored
                storeAuthStateInCookie: true, // This is helpful for certain browsers (like IE) or scenarios where cookies are needed
            }
    };
    
    const msalInstance = new msal.PublicClientApplication(msalConfig);
    
    async function logout() {
            const logoutRequest = {
                account: msalInstance.getAllAccounts()[0], // Automatically logs out the first account (the one used to sign in)
                postLogoutRedirectUri: "https://tsasofficial.github.io/members/logout", // Where to redirect after logout
            };

            try {
                await msalInstance.logoutPopup(logoutRequest);
                console.log("Logout successful.");
            } catch (error) {
                console.error("Logout failed:", error);
            }
        }
    
    if (getCookie("microsoftlogoutcookie") == "active") {
      document.cookie = "microsoftlogoutcookie=; max-age=1; path=/";
      logout()
    } else {
      window.location.href = "../logout";
    }
</script>
</head>
<body>
</body>
</html>
