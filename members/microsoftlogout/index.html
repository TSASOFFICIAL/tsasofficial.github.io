<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Logging you out...</title>
    <link rel="stylesheet" type="text/css" href="../../style.css">
    <link rel="shortcut icon" type="image/png" href="../../images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Angkor&family=Belanosima&display=swap" rel="stylesheet">
    <script type="text/javascript">
        // Function to log out from all Microsoft accounts
        function logoutMicrosoft() {
            // Microsoft logout URL for all accounts
            const logoutUrl = "https://login.microsoftonline.com/common/oauth2/v2.0/logout";
            
            // Redirect URI after successful logout
            const postLogoutRedirectUri = encodeURIComponent("https://tsasofficial.github.io/members/logout");
            
            // Redirect the user to the logout URL
            window.location.href = `${logoutUrl}?post_logout_redirect_uri=${postLogoutRedirectUri}`;
        }
    </script>
  </head>
  <body onload="logoutMicrosoft()">
  </body>
</html>
