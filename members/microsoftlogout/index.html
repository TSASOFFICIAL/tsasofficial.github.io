<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Logging you out...</title>
    <link rel="stylesheet" type="text/css" href="../../style.css">
    <link rel="shortcut icon" type="image/png" href="../../images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Angkor&family=Belanosima&display=swap" rel="stylesheet">
    <script type="text/javascript">
    <script type="text/javascript">
        // Function to log out from Microsoft after a delay
        function redirectToMicrosoftLogout() {
            // Microsoft logout URL for all accounts
            const logoutUrl = "https://login.microsoftonline.com/common/oauth2/v2.0/logout";
            
            // Custom redirect URL after Microsoft logout
            const postLogoutRedirectUri = encodeURIComponent("https://tsasofficial.github.io/members/logout");
            
            // Complete logout URL
            const fullLogoutUrl = `${logoutUrl}?post_logout_redirect_uri=${postLogoutRedirectUri}`;
            
            // Redirect after a brief delay (e.g., 2 seconds)
            setTimeout(() => {
                window.location.href = fullLogoutUrl;
            }, 2000);
        }

        // Initiate logout on page load
        window.onload = redirectToMicrosoftLogout;
    </script>
  </head>
  <body>
  </body>
</html>
