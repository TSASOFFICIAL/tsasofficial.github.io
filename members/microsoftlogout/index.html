<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Logging you out...</title>
    <link rel="stylesheet" type="text/css" href="../../style.css">
    <link rel="shortcut icon" type="image/png" href="../../images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Angkor&family=Belanosima&display=swap" rel="stylesheet">
    <script src="https://alcdn.msauth.net/browser/2.28.1/js/msal-browser.min.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", function () {
      const config = {
        auth: {
          clientId: "244e92a4-1f38-485b-9100-b9581efa4a75",
          redirectUri: "https://tsasofficial.github.io/members/microsoftlogin",
          postLogoutRedirectUri: "https://tsasofficial.github.io/logout",
        },
      };

      const myMsal = new msal.PublicClientApplication(config);

      // Get all accounts
      const accounts = myMsal.getAllAccounts();

      if (accounts.length === 0) {
        document.body.innerHTML = "<p>No accounts found to log out from.</p>";
        return; // No accounts to log out
      }

      // Display the accounts in a list
      const accountList = document.createElement("ul");
      accounts.forEach((account, index) => {
        const listItem = document.createElement("li");
        const button = document.createElement("button");
        button.textContent = `Log out of ${account.username}`;
        button.onclick = function () {
          logoutAccount(account);
        };
        listItem.appendChild(button);
        accountList.appendChild(listItem);
      });
      document.body.appendChild(accountList);

      async function logoutAccount(account) {
        const logoutRequest = {
          account: account, // Pass the selected account
          mainWindowRedirectUri: "https://tsasofficial.github.io/logout",
        };
        await myMsal.logoutPopup(logoutRequest);
      }
    });
    </script>
  </head>
  <body>
    <p>Select an account to log out:</p>
  </body>
</html>
