<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Loading...</title>
        <link rel="stylesheet" type="text/css" href="../../style.css">
        <link rel="shortcut icon" type="image/png" href="../../images/favicon.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Angkor&family=Belanosima&display=swap" rel="stylesheet">
        <script>
            function onload() {
              const searchParams = new URLSearchParams(window.location.search);
              var username = searchParams.get('name');
              var pictureURL = searchParams.get('picture');
	            var usingotheroptions = searchParams.get('usingotheroptions');
	            var usingmicrosoftaccount = searchParams.get('usingmicrosoftaccount');
              document.cookie = "username=" + username + "; max-age=86400; path=/";
        	    document.cookie = "picture=" + pictureURL + "; max-age=86400; path=/";
	            document.cookie = "usingotheroptions=" + usingotheroptions + "; max-age=86400; path=/";
		          document.cookie = "usingmicrosoftaccount=" + usingmicrosoftaccount + "; max-age=86400; path=/";
              window.location.href = "../";
            }
        </script>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body onload=onload()>
    </body>
</html>
